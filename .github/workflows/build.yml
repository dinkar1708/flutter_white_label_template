name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  # Runs once — brand-agnostic checks.
  analyze-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: dart run build_runner build
        run: dart run build_runner build

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test --coverage
        run: flutter test --coverage

      - name: Upload lcov.info
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

  # One job per brand — builds a flavored debug APK and uploads it.
  # "New partner ≈ add a matrix entry": that's the pitch.
  build-android:
    name: Build APK (${{ matrix.brand }})
    needs: analyze-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        brand: [aqua, coral, amber]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: dart run build_runner build
        run: dart run build_runner build

      - name: flutter build apk --flavor ${{ matrix.brand }}
        run: |
          flutter build apk \
            --debug \
            --flavor ${{ matrix.brand }} \
            --dart-define=BRAND=${{ matrix.brand }}

      - name: Upload ${{ matrix.brand }} APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.brand }}-debug
          path: build/app/outputs/flutter-apk/app-${{ matrix.brand }}-debug.apk
          if-no-files-found: error
          retention-days: 14
